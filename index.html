<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기안 자동생성기 | 플로우교육 총무기획팀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:#f4f6fb;color:#222;min-height:100vh}
  header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 32px;display:flex;align-items:center;gap:12px}
  .logo{width:36px;height:36px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
  .header-title{font-size:16px;font-weight:700;color:#1e293b}
  .header-sub{font-size:12px;color:#94a3b8;margin-top:1px}
  .hbadge{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:#059669;background:#ecfdf5;padding:4px 10px;border-radius:20px}
  .dot{width:7px;height:7px;background:#059669;border-radius:50%;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .tabs{display:flex;gap:0;padding:0 32px;background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto}
  .tab{padding:10px 18px;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .15s}
  .tab.active{color:#2563eb;border-bottom-color:#2563eb}
  .tab .close{font-size:11px;color:#94a3b8;margin-left:2px}
  .tab .close:hover{color:#ef4444}
  .tab-add{padding:10px 14px;font-size:18px;color:#94a3b8;cursor:pointer;border:none;background:none}
  .tab-add:hover{color:#2563eb}
  main{display:flex;gap:0;max-width:1100px;margin:32px auto;background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.07);overflow:hidden;min-height:520px}
  .panel-left{width:300px;min-width:260px;border-right:1px solid #e2e8f0;padding:28px 24px;display:flex;flex-direction:column;gap:18px}
  .section-label{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
  .btn-group{display:flex;gap:8px}
  .btn{padding:8px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#334155;transition:all .15s;display:flex;align-items:center;gap:6px}
  .btn.active,.btn:hover{background:#2563eb;color:#fff;border-color:#2563eb}
  .btn-primary{background:#2563eb;color:#fff;border-color:#2563eb;width:100%;justify-content:center;padding:11px;font-size:14px}
  .btn-primary:hover{background:#1d4ed8}
  .upload-zone{border:1.5px dashed #cbd5e1;border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .15s;background:#f8fafc}
  .upload-zone:hover{border-color:#2563eb;background:#eff6ff}
  .upload-zone input{display:none}
  .upload-zone .icon{font-size:24px;margin-bottom:6px}
  .upload-zone .label{font-size:12px;color:#64748b}
  .file-item{display:flex;align-items:center;gap:8px;background:#f1f5f9;border-radius:6px;padding:7px 10px;font-size:12px}
  .file-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#334155}
  .file-item .fsize{color:#94a3b8;font-size:11px}
  .file-item .remove{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;padding:0 2px}
  .file-item .remove:hover{color:#ef4444}
  .input-group{display:flex;flex-direction:column;gap:5px}
  .input-group label{font-size:12px;color:#64748b}
  .input-group input,.input-group select{padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;font-family:inherit;outline:none;transition:border .15s}
  .input-group input:focus,.input-group select:focus{border-color:#2563eb}
  .panel-right{flex:1;padding:28px 32px;display:flex;flex-direction:column;gap:12px}
  .draft-header{display:flex;align-items:center;gap:10px}
  .draft-title{font-size:15px;font-weight:700;color:#1e293b}
  .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#eff6ff;color:#2563eb}
  .draft-actions{margin-left:auto;display:flex;gap:8px}
  .btn-sm{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#334155;transition:all .15s}
  .btn-sm:hover{background:#f1f5f9}
  .btn-sm.primary{background:#2563eb;color:#fff;border-color:#2563eb}
  .btn-sm.primary:hover{background:#1d4ed8}
  .draft-body{flex:1;background:#f8fafc;border-radius:8px;padding:20px;font-size:13px;line-height:2;color:#334155;min-height:320px;white-space:pre-wrap;overflow-y:auto}
  .draft-body.empty{display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px}
  .error-box{background:#fef2f2;color:#dc2626;border-radius:8px;padding:12px 16px;font-size:13px;text-align:center}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#2563eb;font-size:13px}
  .spinner{width:32px;height:32px;border:3px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .footer-bar{display:flex;align-items:center;gap:8px;padding:12px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;font-size:12px;color:#94a3b8}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999}
  .toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="logo">기</div>
  <div>
    <div class="header-title">기안 자동생성기</div>
    <div class="header-sub">플로우교육 총무기획팀 · bizmeka EZ</div>
  </div>
  <div class="hbadge"><span class="dot"></span>자동 감지 중</div>
</header>

<div class="tabs" id="tabs">
  <button class="tab-add" onclick="addTab()">+</button>
</div>

<div style="max-width:1100px;margin:32px auto">
  <div id="tab-contents"></div>
</div>

<div class="footer-bar">
  <span id="footer-total">전체 0건</span>
  <span>|</span>
  <span id="footer-done">완료 0건</span>
  <span>|</span>
  <span>드라이브 자동 또는 직접 업로드</span>
</div>

<div class="toast" id="toast">복사되었습니다</div>

<script>
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyK7ozgmQKZ7FtKygiZOlOVmyLu-9vYTHNUgIprUTxNmyWY0kx92JRNrrH41KY6ySw8/exec';
const SUPABASE_URL = 'https://ayebtgxyjsgrxkmfmnhr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_dmezdbiZFA50vKPRv4b4ow_oYidxzAK';
const POLL_INTERVAL = 30000;

let tabs = [], activeTabId = null, tabCounter = 0, seenIds = new Set();

function uid(){ return 'tab_' + (++tabCounter); }

function addTab(){
  const id = uid();
  tabs.push({ id, fileName:'', fileData:null, fileType:'품의서', draft:'', status:'idle' });
  renderTabs();
  activateTab(id);
}

function closeTab(id, e){
  e.stopPropagation();
  tabs = tabs.filter(t => t.id !== id);
  if(activeTabId === id) activeTabId = tabs.length ? tabs[tabs.length-1].id : null;
  renderTabs();
  renderContent();
}

function activateTab(id){
  activeTabId = id;
  renderTabs();
  renderContent();
}

function getTab(id){ return tabs.find(t => t.id === id); }

function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  tabs.forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'tab' + (t.id === activeTabId ? ' active' : '');
    btn.innerHTML = `<span>${t.fileName || '새 기안'}</span><span class="close" onclick="closeTab('${t.id}',event)">✕</span>`;
    btn.onclick = () => activateTab(t.id);
    el.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'tab-add';
  add.textContent = '+';
  add.onclick = addTab;
  el.appendChild(add);
  updateFooter();
}

function renderContent(){
  const el = document.getElementById('tab-contents');
  if(!activeTabId || !tabs.length){ el.innerHTML = ''; return; }
  const t = getTab(activeTabId);
  el.innerHTML = `
  <div style="display:flex;gap:0;background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.07);overflow:hidden;min-height:520px">
    <div class="panel-left">
      <div>
        <div class="section-label">입력 방식</div>
        <div class="btn-group">
          <button class="btn active" id="btn-direct">📁 직접 업로드</button>
          <button class="btn" id="btn-drive">☁️ 드라이브 자동</button>
        </div>
      </div>
      <div>
        <div class="section-label">기안 유형</div>
        <div class="btn-group">
          <button class="btn ${t.fileType==='품의서'?'active':''}" onclick="setType('${t.id}','품의서')">📄 품의서</button>
          <button class="btn ${t.fileType==='보고서'?'active':''}" onclick="setType('${t.id}','보고서')">📊 보고서</button>
        </div>
      </div>
      <div>
        <div class="section-label">파일 업로드</div>
        <div class="upload-zone" onclick="document.getElementById('file-input-${t.id}').click()">
          <input type="file" id="file-input-${t.id}" accept=".pdf,.xlsx,.xls,.csv" onchange="handleFile('${t.id}',this)">
          <div class="icon">📎</div>
          <div class="label">파일 선택 또는 드래그</div>
          <div class="label" style="margin-top:4px;font-size:11px">PDF, Excel, CSV</div>
        </div>
        ${t.fileName ? `<div class="file-item" style="margin-top:8px">
          <span>📄</span>
          <span class="fname">${t.fileName}</span>
          <button class="remove" onclick="clearFile('${t.id}')">✕</button>
        </div>` : ''}
      </div>
      <div class="input-group">
        <label>결재자</label>
        <input type="text" id="approver-${t.id}" placeholder="예: 경영관리본부장">
      </div>
      <div class="input-group">
        <label>지급 방법</label>
        <select id="paymethod-${t.id}">
          <option>자동 판단</option>
          <option>계좌이체</option>
          <option>법인카드</option>
          <option>현금</option>
        </select>
      </div>
      <div class="input-group">
        <label>지급 요청일</label>
        <input type="text" id="paydate-${t.id}" placeholder="예: 2026년 4월 30일">
      </div>
      <button class="btn btn-primary" onclick="generate('${t.id}')">+ 기안 자동 생성</button>
    </div>
    <div class="panel-right">
      <div class="draft-header">
        <span class="draft-title">기안 초안</span>
        <span class="badge">${t.fileType}</span>
        <div class="draft-actions">
          <button class="btn-sm" onclick="resetDraft('${t.id}')">초기화</button>
          <button class="btn-sm primary" onclick="copyDraft('${t.id}')">전체 복사</button>
        </div>
      </div>
      ${t.status==='done' ? `
      <div style="display:flex;gap:8px;margin-top:4px">
        <input type="text" id="revise-${t.id}" placeholder="수정 요청 입력 (예: 지급방법을 계좌이체로 변경, 담당자 홍길동 추가)"
          style="flex:1;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;font-family:inherit;outline:none"
          onkeydown="if(event.key==='Enter') revise('${t.id}')"
          onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#e2e8f0'">
        <button class="btn-sm primary" onclick="revise('${t.id}')">수정 적용 →</button>
      </div>` : ''}
      <div class="draft-body ${!t.draft && t.status!=='loading' && t.status!=='error' ? 'empty' : ''}" id="draft-body-${t.id}">
        ${t.status==='loading' ? `<div class="loading"><div class="spinner"></div><span>기안 생성 중...</span></div>` :
          t.status==='error' ? `<div class="error-box">${t.draft}</div>` :
          t.draft || '파일을 업로드하고 기안 자동 생성을 눌러주세요.'}
      </div>
    </div>
  </div>`;
}

function setType(id, type){
  const t = getTab(id); if(!t) return;
  t.fileType = type;
  renderContent();
}

function handleFile(id, input){
  const t = getTab(id); if(!t) return;
  const file = input.files[0]; if(!file) return;
  t.fileName = file.name;
  const reader = new FileReader();
  reader.onload = e => { t.fileData = e.target.result; };
  reader.readAsDataURL(file);
  renderContent();
}

function clearFile(id){
  const t = getTab(id); if(!t) return;
  t.fileName = ''; t.fileData = null;
  renderContent();
}

function resetDraft(id){
  const t = getTab(id); if(!t) return;
  t.draft = ''; t.status = 'idle';
  renderContent();
}

function copyDraft(id){
  const t = getTab(id); if(!t || !t.draft) return;
  navigator.clipboard.writeText(t.draft);
  showToast();
}

function showToast(){
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function generate(id){
  const t = getTab(id); if(!t) return;
  if(!t.fileData){ alert('파일을 먼저 업로드해주세요.'); return; }

  t.status = 'loading'; t.draft = '';
  renderContent();

  const approver = document.getElementById('approver-'+id)?.value || '';
  const paymethod = document.getElementById('paymethod-'+id)?.value || '자동 판단';
  const paydate = document.getElementById('paydate-'+id)?.value || '';

  try {
    fetch(PROXY_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        fileName: t.fileName,
        fileBase64: t.fileData.split(',')[1],
        mimeType: t.fileData.split(';')[0].split(':')[1],
        docType: t.fileType,
        approver: approver,
        paymethod: paymethod,
        paydate: paydate
      })
    });

    const startTime = Date.now();
    const poll = setInterval(async () => {
      if(Date.now() - startTime > 30000){
        clearInterval(poll);
        t.draft = '오류: 시간 초과. 드라이브 자동 방식을 사용해주세요.';
        t.status = 'error';
        renderContent();
        return;
      }
      try {
        const res = await fetch(SUPABASE_URL+'/rest/v1/draft_queue?select=*&status=eq.done&drive_file_id=not.is.null&order=created_at.desc&limit=1', {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY }
        });
        const rows = await res.json();
        if(rows.length && !seenIds.has(rows[0].id)){
          clearInterval(poll);
          seenIds.add(rows[0].id);
          t.draft = rows[0].draft_body;
          t.status = 'done';
          renderContent();
        }
      } catch(e) {}
    }, 3000);

  } catch(err) {
    t.draft = '오류: ' + err.message;
    t.status = 'error';
    renderContent();
  }
}

function updateFooter(){
  document.getElementById('footer-total').textContent = '전체 '+tabs.length+'건';
  document.getElementById('footer-done').textContent = '완료 '+tabs.filter(t=>t.status==='done').length+'건';
}
async function revise(id) {
  const t = getTab(id); if(!t || !t.draft) return;
  const input = document.getElementById('revise-'+id);
  const request = input?.value.trim();
  if(!request) { alert('수정 요청 내용을 입력해주세요.'); return; }
  t.status = 'loading';
  renderContent();
  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        mode: 'revise',
        draft: t.draft,
        request: request
      })
    });
    const json = await res.json();
    if(!json.ok) throw new Error(json.error || '서버 오류');
    const text = (json.data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('');
    if(!text) throw new Error('응답 없음');
    t.draft = text;
    t.status = 'done';
    renderContent();
  } catch(e) {
    t.draft = '오류: ' + e.message;
    t.status = 'error';
    renderContent();
  }
}
// 드라이브 자동 폴링
async function pollSupabase(){
  try {
    const res = await fetch(SUPABASE_URL+'/rest/v1/draft_queue?select=*&status=eq.done&drive_file_id=not.is.null&order=created_at.desc&limit=20', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY }
    });
    const rows = await res.json();
    if(!Array.isArray(rows)) return;

    // 현재 Supabase에 있는 id 목록
    const activeIds = new Set(rows.map(r => r.id));

    // 드라이브에서 삭제된 탭 제거
    tabs = tabs.filter(t => {
      if(!t.supabaseId) return true; // 직접 업로드 탭은 유지
      return activeIds.has(t.supabaseId);
    });

    // 새 항목만 탭 추가
    rows.forEach(row => {
      if(seenIds.has(row.id)) return;
      seenIds.add(row.id);
      const id = uid();
      tabs.push({ id, supabaseId: row.id, fileName: row.file_name, fileData: null, fileType: row.doc_type || '품의서', draft: row.draft_body, status: 'done' });
    });

    renderTabs();
    if(activeTabId && !tabs.find(t => t.id === activeTabId)){
      activeTabId = tabs.length ? tabs[tabs.length-1].id : null;
    }
    renderContent();
  } catch(e) {}
}

// 초기화
addTab();
pollSupabase();
setInterval(pollSupabase, POLL_INTERVAL);
</script>
</body>
</html>
