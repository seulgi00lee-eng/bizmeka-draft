<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기안 자동생성기 | 플로우교육 총무기획팀</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--bg:#f8f9fc;--surface:#ffffff;--surface2:#f0f4fa;--border:#e2e8f0;--accent:#2563eb;--accent2:#7c3aed;--success:#059669;--text:#1e293b;--text2:#64748b;--text3:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.hinfo h1{font-size:15px;font-weight:700}
.hinfo p{font-size:11px;color:var(--text2)}
.hbadge{margin-left:auto;font-size:11px;padding:4px 12px;border-radius:20px;background:#ecfdf5;color:var(--success);border:1px solid #a7f3d0}
.config-bar{background:#fef3c7;border-bottom:2px solid #f59e0b;padding:10px 24px;font-size:12px;color:#92400e;display:none;align-items:center;gap:8px}
.config-bar.show{display:flex}
.wrap{display:grid;grid-template-columns:1fr;max-width:1100px;margin:0 auto;padding:24px 16px;gap:20px}
.tabbar{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow-x:auto;padding:6px;gap:4px}
.tabbar::-webkit-scrollbar{height:3px}
.tabbar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border:1px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0}
.tab.active .tab-dot{opacity:1;background:#fff}
.tab-dot.done{background:var(--success);opacity:1}
.tab-close{background:none;border:none;cursor:pointer;font-size:13px;color:currentColor;opacity:.6;padding:1px 3px;border-radius:3px;line-height:1}
.tab-close:hover{opacity:1}
.add-tab{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:7px;border:1px dashed var(--border);background:none;cursor:pointer;font-size:18px;color:var(--text3);flex-shrink:0;transition:all .15s}
.add-tab:hover{border-color:var(--accent);color:var(--accent);background:#eff6ff}
.panels{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.panel{display:none}
.panel.active{display:block}
.pinner{display:grid;grid-template-columns:280px 1fr;min-height:560px}
@media(max-width:700px){.pinner{grid-template-columns:1fr}}
.pleft{border-right:1px solid var(--border);padding:18px 16px;display:flex;flex-direction:column;gap:14px;background:var(--surface2)}
.sec-ttl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.type-btn{padding:9px 6px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;text-align:center;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.type-btn.on{border-color:var(--accent);background:#eff6ff;color:var(--accent)}
.drop-zone{border:1.5px dashed var(--border);border-radius:8px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface)}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:#eff6ff}
.dz-title{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:3px}
.dz-sub{font-size:10.5px;color:var(--text2)}
.dz-sub em{color:var(--accent);font-style:normal}
.fchip{display:none;align-items:center;gap:7px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-top:8px}
.fchip.on{display:flex}
.fc-name{flex:1;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-size{font-size:10px;color:var(--text3);flex-shrink:0}
.fdel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px;flex-shrink:0}
.opt-grid{display:flex;flex-direction:column;gap:7px}
.opt-item label{font-size:10.5px;color:var(--text2);font-weight:500;display:block;margin-bottom:3px}
.opt-item input,.opt-item select{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:var(--surface);color:var(--text)}
.opt-hint{font-size:10px;color:var(--text3);line-height:1.6}
.gen-btn{padding:11px;border-radius:8px;background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;width:100%;transition:all .2s;font-family:'Noto Sans KR',sans-serif;margin-top:auto}
.gen-btn:hover:not(:disabled){background:#1d4ed8;transform:translateY(-1px)}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.pright{display:flex;flex-direction:column}
.pright-hd{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.pright-ttl{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.dtype-tag{font-size:9.5px;padding:2px 7px;border-radius:5px;background:#eff6ff;color:var(--accent);border:1px solid #bfdbfe}
.pright-acts{display:flex;gap:5px}
.act-btn{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Noto Sans KR',sans-serif}
.act-copy{background:#ecfdf5;border-color:#a7f3d0;color:var(--success)}
.pright-body{flex:1;overflow-y:auto;padding:18px}
.empty{height:100%;min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center}
.empty-ttl{font-size:14px;font-weight:600;color:var(--text)}
.empty-sub{font-size:12px;color:var(--text2);line-height:1.7}
.auto-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:20px;font-size:11px;color:var(--accent);margin-top:10px}
.auto-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink .9s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.loading{height:100%;min-height:400px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loading.on{display:flex}
.spin{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lstep{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;transition:color .3s}
.lstep.act{color:var(--accent)}
.lstep.done{color:var(--success)}
.ld{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.draft{display:none;flex-direction:column;gap:12px}
.draft.on{display:flex}
.icard{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.chd{padding:8px 13px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.edit-hint{font-size:9px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0}
.igrid{display:grid;grid-template-columns:repeat(3,1fr)}
.ig{padding:9px 12px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.ig:nth-child(3n){border-right:none}
.ig:nth-last-child(-n+3){border-bottom:none}
.ig-k{font-size:9.5px;color:var(--text3);margin-bottom:2px}
.ig-v{font-size:11.5px;font-weight:600;color:var(--text);word-break:break-all}
.bcontent{padding:16px 18px;font-size:13px;line-height:2.1;color:var(--text);white-space:pre-wrap;outline:none;min-height:160px}
.bcontent:focus{background:#f8faff}
.cta-bar{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:8px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.cta-txt{font-size:11.5px;color:#065f46;line-height:1.5}
.cta-btn{padding:8px 14px;background:var(--success);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Noto Sans KR',sans-serif}
.cta-btn:hover{background:#047857}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px;font-size:12px;color:#991b1b;line-height:1.6}
.toast{position:fixed;bottom:20px;right:20px;background:var(--success);color:#fff;padding:10px 16px;border-radius:8px;font-size:12.5px;font-weight:600;transform:translateY(60px);opacity:0;transition:all .25s;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.on{transform:translateY(0);opacity:1}
.summary{padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:12px}
.summary b{color:var(--text)}
.s-sep{color:var(--border)}
</style>
</head>
<body>
<header>
  <div class="logo">기</div>
  <div class="hinfo">
    <h1>기안 자동생성기</h1>
    <p>플로우교육 총무기획팀 · bizmeka EZ</p>
  </div>
  <span class="hbadge" id="poll-badge">● 자동 감지 중</span>
</header>

<!-- Supabase 미설정 안내 -->
<div class="config-bar" id="config-bar">
  ⚠️ index.html 파일 안의 SUPABASE_URL과 SUPABASE_KEY를 실제 값으로 교체해주세요.
</div>

<div class="wrap">
  <div class="tabbar" id="tabbar">
    <button class="add-tab" onclick="addDraft()" title="새 기안 수동 추가">+</button>
  </div>
  <div class="panels" id="panels"></div>
  <div class="summary" id="summarybar">
    <span>전체 <b id="total-count">0</b>건</span>
    <span class="s-sep">|</span>
    <span>완료 <b id="done-count" style="color:var(--success)">0</b>건</span>
    <span class="s-sep">|</span>
    <span style="color:var(--text3)">드라이브 폴더에 파일 업로드 → 자동 생성</span>
  </div>
</div>
<div class="toast" id="toast">복사되었습니다</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ★ 여기에 Supabase 정보 입력 ★
const SUPABASE_URL = 'https://ayebtgxyjsgrxkmfmnhr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_dmezdbiZFA50vKPRv4b4ow_oYidxzAK';
const POLL_INTERVAL = 30000; // 30초마다 신규 기안 확인

let drafts = [], activeId = null, draftCounter = 0;
let seenIds = new Set();

// 설정 확인
if (SUPABASE_URL.includes('여기에')) {
  document.getElementById('config-bar').classList.add('show');
}

// ── Supabase 폴링 ──
async function pollSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/draft_queue?status=eq.done&order=created_at.desc&limit=20`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) return;
    const rows = await res.json();
    rows.forEach(row => {
      if (!seenIds.has(row.id)) {
        seenIds.add(row.id);
        addDraftFromSupabase(row);
      }
    });
  } catch(e) { console.log('폴링 오류:', e.message); }
}

function addDraftFromSupabase(row) {
  const id = ++draftCounter;
  const d = {
    id, name: row.file_name?.slice(0,14) || '기안 '+id,
    docType: row.doc_type || '품의서',
    fileData: null, fileType: '', fileName: row.file_name || '',
    status: 'done', fromSupabase: true,
    draftBody: row.draft_body || '',
    createdAt: row.created_at,
    sourceUrl: row.source_url || ''
  };
  drafts.push(d);
  renderTab(d);
  renderPanel(d);
  if (drafts.length === 1) switchTab(id);
  updateSummary();
  // 자동 생성된 기안 본문 채우기
  setTimeout(() => {
    const bc = document.getElementById('bc-'+id);
    if (bc && d.draftBody) {
      bc.textContent = d.draftBody;
      showDraftPanel(id, d);
    }
  }, 100);
}

function showDraftPanel(id, d) {
  const today = new Date(d.createdAt || Date.now());
  const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
  const meta = [
    {k:'문서 유형', v:d.docType},{k:'생성일', v:dateStr},{k:'기안 부서', v:'총무기획팀'},
    {k:'결재자', v:'(확인 필요)'},{k:'파일명', v:d.fileName},{k:'출처', v:d.sourceUrl?'드라이브 연동':'수동 업로드'}
  ];
  const ig = document.getElementById('ig-'+id);
  if (ig) ig.innerHTML = meta.map(m=>`<div class="ig"><div class="ig-k">${m.k}</div><div class="ig-v">${m.v}</div></div>`).join('');
  document.getElementById('em-'+id).style.display='none';
  document.getElementById('lo-'+id).classList.remove('on');
  document.getElementById('dr-'+id).classList.add('on');
  setTabStatus(id,'done');
  updateSummary();
}

// ── 수동 업로드 ──
function uid(){ return ++draftCounter; }

function addDraft(){
  const id = uid();
  const d = { id, name:'기안 '+id, docType:'품의서', fileData:null, fileType:'', fileName:'', status:'empty', fromSupabase:false };
  drafts.push(d);
  renderTab(d); renderPanel(d); switchTab(id); updateSummary();
}

function renderTab(d){
  const tabbar = document.getElementById('tabbar');
  const addBtn = tabbar.querySelector('.add-tab');
  const tab = document.createElement('div');
  tab.className = 'tab'; tab.id = 'tab-'+d.id;
  tab.onclick = ()=>switchTab(d.id);
  const dotClass = d.status==='done' ? 'tab-dot done' : 'tab-dot';
  tab.innerHTML = `<span class="${dotClass}" id="ts-${d.id}"></span><span id="tl-${d.id}">${d.name}</span><button class="tab-close" onclick="event.stopPropagation();removeDraft(${d.id})">×</button>`;
  tabbar.insertBefore(tab, addBtn);
}

function renderPanel(d){
  const panels = document.getElementById('panels');
  const el = document.createElement('div');
  el.className = 'panel'; el.id = 'panel-'+d.id;
  const isAuto = d.fromSupabase;
  el.innerHTML = `
  <div class="pinner">
    <div class="pleft">
      <div>
        <div class="sec-ttl">기안 유형</div>
        <div class="type-row">
          <button class="type-btn ${d.docType==='품의서'?'on':''}" data-type="품의서" onclick="setType(${d.id},this)">📋 품의서</button>
          <button class="type-btn ${d.docType==='보고서'?'on':''}" data-type="보고서" onclick="setType(${d.id},this)">📊 보고서</button>
        </div>
      </div>
      ${isAuto ? `
      <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;font-size:11.5px;color:var(--accent);line-height:1.7">
        <b>자동 생성된 기안</b><br>
        드라이브 연동으로 생성됨<br>
        ${d.sourceUrl ? `<a href="${d.sourceUrl}" target="_blank" style="color:var(--accent);font-size:10.5px">원본 파일 보기 →</a>` : ''}
      </div>` : `
      <div>
        <div class="sec-ttl">파일 업로드</div>
        <div class="drop-zone" id="dz-${d.id}" onclick="document.getElementById('fi-${d.id}').click()" ondragover="onDragOver(event,'${d.id}')" ondrop="onDrop(event,${d.id})" ondragleave="onDragLeave(${d.id})">
          <div class="dz-title">파일을 드래그하거나 클릭</div>
          <div class="dz-sub"><em>PDF</em> · xlsx · csv</div>
        </div>
        <input type="file" id="fi-${d.id}" accept=".pdf,.xlsx,.xls,.csv" onchange="onFileSelect(event,${d.id})">
        <div class="fchip" id="fc-${d.id}">
          <span id="fci-${d.id}" style="font-size:15px">📄</span>
          <span class="fc-name" id="fn-${d.id}"></span>
          <span class="fc-size" id="fs-${d.id}"></span>
          <button class="fdel" onclick="removeFile(${d.id})">✕</button>
        </div>
      </div>`}
      <div>
        <div class="sec-ttl">추가 정보 (선택)</div>
        <div class="opt-grid">
          <div class="opt-item"><label>결재자</label><input type="text" id="oa-${d.id}" placeholder="예: 경영관리본부장"></div>
          <div class="opt-item"><label>지급 방법</label>
            <select id="op-${d.id}"><option value="">자동 판단</option><option>계좌이체</option><option>법인카드</option><option>전도금</option><option>자동이체</option></select>
          </div>
          <div class="opt-item"><label>지급 요청일</label><input type="text" id="od-${d.id}" placeholder="예: 2026년 4월 30일"></div>
        </div>
      </div>
      ${!isAuto ? `<button class="gen-btn" id="gb-${d.id}" onclick="generate(${d.id})">✦ 기안 자동 생성</button>` : ''}
    </div>
    <div class="pright">
      <div class="pright-hd">
        <div class="pright-ttl">기안 초안<span class="dtype-tag" id="dtag-${d.id}">${d.docType}</span></div>
        <div class="pright-acts">
          <button class="act-btn" onclick="resetDraft(${d.id})">초기화</button>
          <button class="act-btn act-copy" onclick="copyDraft(${d.id})">전체 복사</button>
        </div>
      </div>
      <div class="pright-body">
        <div class="empty" id="em-${d.id}">
          <div style="font-size:28px;opacity:.2">📝</div>
          <div class="empty-ttl">${isAuto ? '기안 생성 완료 후 자동 표시됩니다' : '파일을 업로드하고 생성 버튼을 눌러주세요'}</div>
          <div class="empty-sub">${isAuto ? '드라이브 폴더에 파일을 저장하면<br>자동으로 이 탭에 기안이 채워집니다' : 'PDF, Excel, CSV 모두 지원합니다'}</div>
          ${isAuto ? '<div class="auto-badge"><span class="auto-dot"></span>자동 감지 대기 중</div>' : ''}
        </div>
        <div class="loading" id="lo-${d.id}">
          <div class="spin"></div>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
            <div class="lstep" id="ls1-${d.id}"><span class="ld"></span>파일 읽는 중...</div>
            <div class="lstep" id="ls2-${d.id}"><span class="ld"></span>내용 분석 중...</div>
            <div class="lstep" id="ls3-${d.id}"><span class="ld"></span>항목 추출 중...</div>
            <div class="lstep" id="ls4-${d.id}"><span class="ld"></span>본문 작성 중...</div>
          </div>
        </div>
        <div class="draft" id="dr-${d.id}">
          <div class="icard">
            <div class="chd">기안 헤더</div>
            <div class="igrid" id="ig-${d.id}"></div>
          </div>
          <div class="icard">
            <div class="chd">기안 본문<span class="edit-hint">클릭해서 수정 가능</span></div>
            <div class="bcontent" id="bc-${d.id}" contenteditable="true"></div>
          </div>
          <div class="cta-bar">
            <div class="cta-txt">검토 후 복사 → bizmeka EZ 기안 본문 붙여넣기</div>
            <button class="cta-btn" onclick="copyDraft(${d.id})">복사 → bizmeka</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
  panels.appendChild(el);
}

function switchTab(id){
  activeId=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id)?.classList.add('active');
  document.getElementById('panel-'+id)?.classList.add('active');
}

function removeDraft(id){
  if(drafts.length<=1){alert('마지막 기안은 삭제할 수 없습니다.');return;}
  drafts=drafts.filter(d=>d.id!==id);
  document.getElementById('tab-'+id)?.remove();
  document.getElementById('panel-'+id)?.remove();
  if(activeId===id) switchTab(drafts[drafts.length-1].id);
  updateSummary();
}

function getDraft(id){return drafts.find(d=>d.id===id);}

function setType(id,btn){
  document.getElementById('panel-'+id).querySelectorAll('.type-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  getDraft(id).docType=btn.dataset.type;
  document.getElementById('dtag-'+id).textContent=btn.dataset.type;
}

function onDragOver(e,id){e.preventDefault();document.getElementById('dz-'+id)?.classList.add('over');}
function onDragLeave(id){document.getElementById('dz-'+id)?.classList.remove('over');}
function onDrop(e,id){e.preventDefault();onDragLeave(id);const f=e.dataTransfer.files[0];if(f)loadFile(id,f);}
function onFileSelect(e,id){const f=e.target.files[0];if(f)loadFile(id,f);}

function loadFile(id,file){
  const d=getDraft(id); d.fileName=file.name;
  const ext=file.name.split('.').pop().toLowerCase();
  const icons={pdf:'📕',xlsx:'📊',xls:'📊',csv:'📄'};
  document.getElementById('fci-'+id).textContent=icons[ext]||'📄';
  document.getElementById('fn-'+id).textContent=file.name;
  document.getElementById('fs-'+id).textContent=fmtSize(file.size);
  document.getElementById('fc-'+id).classList.add('on');
  document.getElementById('dz-'+id).style.display='none';
  document.getElementById('tl-'+id).textContent=file.name.length>14?file.name.slice(0,14)+'…':file.name;
  if(ext==='pdf'){d.fileType='pdf';const r=new FileReader();r.onload=e=>{d.fileData=e.target.result.split(',')[1];};r.readAsDataURL(file);}
  else if(ext==='csv'){d.fileType='text';const r=new FileReader();r.onload=e=>{d.fileData=e.target.result;};r.readAsText(file,'UTF-8');}
  else{d.fileType='text';const r=new FileReader();r.onload=e=>{const wb=XLSX.read(e.target.result,{type:'array'});let out='';wb.SheetNames.forEach(n=>{const csv=XLSX.utils.sheet_to_csv(wb.Sheets[n]);if(csv.replace(/,/g,'').trim())out+=`[시트: ${n}]\n${csv}\n\n`;});d.fileData=out;};r.readAsArrayBuffer(file);}
}

function removeFile(id){
  const d=getDraft(id);d.fileData=null;d.fileType='';d.fileName='';
  document.getElementById('fc-'+id).classList.remove('on');
  document.getElementById('dz-'+id).style.display='';
  document.getElementById('fi-'+id).value='';
  document.getElementById('tl-'+id).textContent='기안 '+id;
}
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}

let stepTimers={};
function startSteps(id){
  const ids=[`ls1-${id}`,`ls2-${id}`,`ls3-${id}`,`ls4-${id}`];
  ids.forEach(i=>{const el=document.getElementById(i);if(el)el.className='lstep';});
  let i=0;
  stepTimers[id]=setInterval(()=>{
    if(i>0){const el=document.getElementById(ids[i-1]);if(el)el.className='lstep done';}
    if(i<ids.length){const el=document.getElementById(ids[i]);if(el)el.className='lstep act';i++;}
  },900);
}
function stopSteps(id){clearInterval(stepTimers[id]);}
function setTabStatus(id,status){
  const ts=document.getElementById('ts-'+id);
  if(!ts)return;
  ts.className='tab-dot'+(status==='done'?' done':'');
}
function updateSummary(){
  document.getElementById('total-count').textContent=drafts.length;
  document.getElementById('done-count').textContent=drafts.filter(d=>d.status==='done').length;
}

async function generate(id){
  const d=getDraft(id);
  if(!d.fileData){alert('파일을 먼저 업로드해주세요.');return;}
  const optApprover=document.getElementById('oa-'+id)?.value.trim()||'';
  const optPayment=document.getElementById('op-'+id)?.value||'';
  const optPaydate=document.getElementById('od-'+id)?.value.trim()||'';
  document.getElementById('em-'+id).style.display='none';
  document.getElementById('dr-'+id).classList.remove('on');
  document.getElementById('lo-'+id).classList.add('on');
  document.getElementById('gb-'+id).disabled=true;
  d.status='loading';setTabStatus(id,'loading');startSteps(id);
  const today=new Date();const dateStr=`${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
  const isPumui=d.docType==='품의서';
  const sysPrompt='당신은 대한민국 교육기업 총무기획팀의 기안 작성 전문가입니다.';
  const userTxt=`다음 파일과 정보를 바탕으로 ${d.docType} 기안 본문을 완성해주세요.\n\n[기안 정보]\n- 기안일: ${dateStr}\n- 기안 부서: 총무기획팀\n- 결재자: ${optApprover||'(파일에서 추출)'}\n${optPayment?`- 지급 방법: ${optPayment}\n`:''}${optPaydate?`- 지급 요청일: ${optPaydate}\n`:''}\n[작성 지침]\n1.파일 내용 분석하여 모든 항목 채울 것\n2.금액·수량·업체명·날짜 정확히 추출\n3.없는 항목은 [확인 필요] 표기\n4.격식체, 양식 그대로, 본문 외 설명 금지\n\n${isPumui?'[출력 양식]\n상기 건으로 아래와 같이 품의 하오니 재가 해주시기 바랍니다.\n\n\n              -    아         래    -\n\n\n1. 안 건 : \n2. 목 적 : \n3. 내 용 : \n4. 예상(예산) 금액 : \n5. 업 체 : \n6. 지급 방법 : \n7. 지급 요청일 : \n8. 첨부서식 : \n9. 기 타 : ':'[출력 양식]\n상기 건으로 아래와 같이 보고 드립니다.\n\n\n              -    아         래    -\n\n\n1. 개 요 : \n2. 주요 내용 : \n3. 세부 현황 : \n4. 시사점 및 결론 : \n5. 첨부서식 : \n6. 기 타 : '}`;
  let msgContent;
  if(d.fileType==='pdf') msgContent=[{type:'document',source:{type:'base64',media_type:'application/pdf',data:d.fileData}},{type:'text',text:userTxt}];
  else msgContent=[{type:'text',text:userTxt+'\n\n[파일 데이터]\n'+d.fileData.slice(0,5000)}];
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:sysPrompt,messages:[{role:'user',content:msgContent}]})
    });
    const data=await res.json();
    if(data.error)throw new Error(`[${data.error.type}] ${data.error.message}`);
    const body=data.content?.[0]?.text||'생성 실패.';
    document.getElementById('bc-'+id).textContent=body;
    d.draftBody=body;
    showDraftPanel(id,{...d,createdAt:new Date().toISOString()});
    document.getElementById('tl-'+id).textContent=(d.fileName||'기안 '+id).slice(0,14);
    d.status='done';
  }catch(err){
    stopSteps(id);
    document.getElementById('lo-'+id).classList.remove('on');
    document.getElementById('em-'+id).style.display='';
    document.getElementById('em-'+id).innerHTML=`<div class="err-box">오류: ${err.message}</div><button class="act-btn" style="margin-top:10px" onclick="resetDraft(${id})">초기화</button>`;
    d.status='empty';setTabStatus(id,'');
  }
  document.getElementById('gb-'+id).disabled=false;
  updateSummary();
}

function copyDraft(id){
  const body=document.getElementById('bc-'+id)?.innerText||'';
  navigator.clipboard.writeText(body).then(()=>{
    const t=document.getElementById('toast');t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000);
  });
}

function resetDraft(id){
  const d=getDraft(id);
  if(!d.fromSupabase) removeFile(id);
  ['oa-','od-'].forEach(p=>{const el=document.getElementById(p+id);if(el)el.value='';});
  const op=document.getElementById('op-'+id);if(op)op.value='';
  document.getElementById('dr-'+id).classList.remove('on');
  document.getElementById('lo-'+id).classList.remove('on');
  document.getElementById('em-'+id).style.display='';
  document.getElementById('tl-'+id).textContent='기안 '+id;
  d.status='empty';setTabStatus(id,'');updateSummary();
}

// 초기 탭 1개 + 폴링 시작
addDraft();
setInterval(pollSupabase, POLL_INTERVAL);
setTimeout(pollSupabase, 2000); // 첫 로드 시 즉시 조회
</script>
